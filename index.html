<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel War 2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e8e8e8; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; image-rendering: pixelated; }

    .zoom-controls {
      position: fixed; bottom: 16px; right: 16px;
      display: flex; gap: 6px; z-index: 10;
    }
    .zoom-btn {
      width: 34px; height: 34px;
      background: white; border: 2px solid #ddd;
      border-radius: 6px; cursor: pointer;
      font-size: 18px; font-weight: 900; color: #444;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-btn:hover { border-color: #ff3e3e; color: #ff3e3e; }
    .zoom-label {
      background: white; border: 2px solid #ddd;
      border-radius: 6px; padding: 0 10px;
      font-size: 13px; font-weight: 900; color: #888;
      display: flex; align-items: center;
    }
    .coords {
      position: fixed; bottom: 16px; left: 16px;
      background: rgba(255,255,255,0.95); border: 1px solid #ddd;
      border-radius: 6px; padding: 5px 12px;
      font-size: 12px; font-family: monospace; color: #666;
    }

    /* POPUP */
    .popup {
      display: none; position: fixed; z-index: 100;
      background: white; border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      padding: 16px; width: 260px;
    }
    .popup.open { display: block; }
    .popup-titre {
      font-size: 11px; font-weight: 900; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .palette {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 5px; margin-bottom: 12px;
    }
    .swatch {
      width: 100%; aspect-ratio: 1; border-radius: 4px;
      cursor: pointer; border: 3px solid transparent; transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #222; transform: scale(1.2); }
    .bonus-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .bonus-btn {
      flex: 1; padding: 9px 4px; border-radius: 8px; border: 2px solid;
      cursor: pointer; text-align: center; font-size: 11px; font-weight: 900;
      background: white; transition: all 0.1s;
    }
    .bonus-btn.bombe { border-color: #ff6400; color: #ff6400; }
    .bonus-btn.bombe:hover, .bonus-btn.bombe.actif { background: #fff5ef; }
    .bonus-btn.bouclier { border-color: #00cfff; color: #00a8d6; }
    .bonus-btn.bouclier:hover, .bonus-btn.bouclier.actif { background: #eafaff; }
    .bonus-btn .icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .bonus-btn .prix { font-size: 10px; color: #aaa; }
    .bonus-btn .effet { font-size: 9px; color: #bbb; margin-top: 3px; line-height: 1.3; }
    .btn-placer {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #ff3e3e, #ff8c00);
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 900; color: white;
      cursor: pointer; letter-spacing: 1px;
    }
    .btn-annuler {
      width: 100%; padding: 7px; background: none; border: none;
      font-size: 12px; color: #bbb; cursor: pointer; margin-top: 5px;
    }
  </style>
</head>
<body>

<canvas id="grille"></canvas>

<div class="popup" id="popup">
  <div class="popup-titre">🎨 Couleur</div>
  <div class="palette" id="palette"></div>
  <div class="popup-titre">⚡ Bonus</div>
  <div class="bonus-row">
    <div class="bonus-btn bombe" onclick="choisirBonus('bombe')">
      <span class="icon">💣</span>Bombe
      <div class="prix">1,50€</div>
      <div class="effet">Efface 3×3 pixels</div>
    </div>
    <div class="bonus-btn bouclier" onclick="choisirBonus('bouclier')">
      <span class="icon">🛡️</span>Bouclier
      <div class="prix">1,50€</div>
      <div class="effet">Protège 3×3 pixels<br>pendant 30 sec</div>
    </div>
  </div>
  <button class="btn-placer" id="btnPlacer" onclick="confirmer()">✅ Placer — 0,50€</button>
  <button class="btn-annuler" onclick="fermerPopup()">Annuler</button>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" onclick="changerZoom(-1)">−</button>
  <div class="zoom-label" id="zoomLabel">2×</div>
  <button class="zoom-btn" onclick="changerZoom(+1)">+</button>
</div>
<div class="coords" id="coords">x: — y: —</div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://huywcerfzcehpevdzmde.supabase.co';
const SUPABASE_KEY = 'sb_publishable__0L2OWXCe_Dxtim0uHwu-w_r1eqnF1j';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CONFIG ──
const GRID_W = 1415;
const GRID_H = 1415;
const ZOOMS  = [1, 2, 3, 4, 6, 8, 10];
let zoomIdx  = 1;
let taille   = ZOOMS[zoomIdx];

const canvas = document.getElementById('grille');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

let offsetX = (canvas.width  - GRID_W * taille) / 2;
let offsetY = (canvas.height - GRID_H * taille) / 2;

const pixels = {};
const casesProtegees = new Set();

// ── SUPABASE : charger pixels ──
async function chargerPixels() {
  const { data, error } = await sb.from('pixels').select('*');
  if (error) { console.error(error); return; }
  data.forEach(p => { pixels[p.x + ',' + p.y] = p.couleur; });
  dessiner();
}

sb.channel('pixels')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pixels' }, payload => {
    if (payload.eventType === 'DELETE') delete pixels[payload.old.x+','+payload.old.y];
    else pixels[payload.new.x+','+payload.new.y] = payload.new.couleur;
    dessiner();
  })
  .subscribe();

// ── DESSIN ──
function dessiner() {
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(offsetX, offsetY, GRID_W * taille, GRID_H * taille);

  for (const key in pixels) {
    const [x, y] = key.split(',').map(Number);
    const px = offsetX + x * taille;
    const py = offsetY + y * taille;
    if (px > -taille && px < canvas.width && py > -taille && py < canvas.height) {
      ctx.fillStyle = pixels[key];
      ctx.fillRect(px, py, taille, taille);
    }
  }

  // Zones protégées
  for (const key of casesProtegees) {
    const [x, y] = key.split(',').map(Number);
    ctx.fillStyle = 'rgba(0,207,255,0.3)';
    ctx.fillRect(offsetX + x*taille, offsetY + y*taille, taille, taille);
  }

  if (taille >= 3) {
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    const sx = Math.max(0, Math.floor(-offsetX/taille));
    const sy = Math.max(0, Math.floor(-offsetY/taille));
    const ex = Math.min(GRID_W, sx + Math.ceil(canvas.width/taille) + 1);
    const ey = Math.min(GRID_H, sy + Math.ceil(canvas.height/taille) + 1);
    for (let x = sx; x <= ex; x++) {
      ctx.beginPath(); ctx.moveTo(offsetX+x*taille, offsetY); ctx.lineTo(offsetX+x*taille, offsetY+GRID_H*taille); ctx.stroke();
    }
    for (let y = sy; y <= ey; y++) {
      ctx.beginPath(); ctx.moveTo(offsetX, offsetY+y*taille); ctx.lineTo(offsetX+GRID_W*taille, offsetY+y*taille); ctx.stroke();
    }
  }

  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
  ctx.strokeRect(offsetX, offsetY, GRID_W*taille, GRID_H*taille);
}

// ── COULEURS ──
const COULEURS = [
  '#FFFFFF','#C4C4C4','#888888','#555555','#222222','#000000',
  '#FFA7D1','#CF6EE4','#EC08EC','#820080','#6B0000','#E50000',
  '#FF3904','#E59500','#E5D900','#FFDFCC','#A06A42','#402614',
  '#94E044','#02BE01','#00D3DD','#36BAFF','#0000EA','#044BFF',
  '#D46400','#45FFC8',
];

let couleurActive = '#E50000';
let bonusActif    = null;
let caseSelectee  = null;

const paletteEl = document.getElementById('palette');
COULEURS.forEach(c => {
  const div = document.createElement('div');
  div.className = 'swatch' + (c === couleurActive ? ' active' : '');
  div.style.background = c;
  if (c === '#FFFFFF') div.style.border = '3px solid #ddd';
  div.onclick = () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    div.classList.add('active');
    couleurActive = c;
    bonusActif = null;
    document.querySelectorAll('.bonus-btn').forEach(b => b.classList.remove('actif'));
    document.getElementById('btnPlacer').textContent = '✅ Placer — 0,50€';
  };
  paletteEl.appendChild(div);
});

function choisirBonus(type) {
  bonusActif = bonusActif === type ? null : type;
  document.querySelectorAll('.bonus-btn').forEach(b => b.classList.remove('actif'));
  if (bonusActif) {
    document.querySelector('.bonus-btn.'+type).classList.add('actif');
    document.getElementById('btnPlacer').textContent =
      type === 'bombe' ? '💣 Utiliser Bombe — 1,50€' : '🛡️ Utiliser Bouclier — 1,50€';
  } else {
    document.getElementById('btnPlacer').textContent = '✅ Placer — 0,50€';
  }
}

// ── POPUP ──
function ouvrirPopup(gx, gy, clientX, clientY) {
  caseSelectee = { x: gx, y: gy };
  bonusActif   = null;
  document.querySelectorAll('.bonus-btn').forEach(b => b.classList.remove('actif'));
  document.getElementById('btnPlacer').textContent = '✅ Placer — 0,50€';

  const popup = document.getElementById('popup');
  popup.classList.add('open');
  let px = clientX + 14, py = clientY + 14;
  if (px + 270 > window.innerWidth)  px = clientX - 270;
  if (py + 380 > window.innerHeight) py = clientY - 380;
  popup.style.left = px + 'px';
  popup.style.top  = py + 'px';
}

function fermerPopup() {
  document.getElementById('popup').classList.remove('open');
  caseSelectee = null;
  bonusActif   = null;
}

function confirmer() {
  if (!caseSelectee) return;
  const { x, y } = caseSelectee;

  if (bonusActif === 'bombe') {
    for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H) {
        delete pixels[nx+','+ny];
        sb.from('pixels').delete().eq('x',nx).eq('y',ny).then(()=>{});
      }
    }
  } else if (bonusActif === 'bouclier') {
    const exp = Date.now() + 30000;
    for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H) casesProtegees.add(nx+','+ny);
    }
    setTimeout(() => {
      for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++)
        casesProtegees.delete((x+dx)+','+(y+dy));
      dessiner();
    }, 30000);
  } else if (couleurActive) {
    if (casesProtegees.has(x+','+y)) {
      afficherMsg('🛡️ Case protégée !', '#00cfff');
      fermerPopup();
      return;
    }
    pixels[x+','+y] = couleurActive;
    sb.from('pixels').upsert({ x, y, couleur: couleurActive }).then(({ error }) => {
      if (error) console.error(error);
    });
  }

  dessiner();
  fermerPopup();
}

function afficherMsg(msg, couleur) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `position:fixed;top:80px;left:50%;transform:translateX(-50%);background:white;border:2px solid ${couleur};color:${couleur};padding:8px 18px;border-radius:8px;font-weight:900;font-size:14px;z-index:999`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

// ── INTERACTIONS ──
let drag = false, hasDragged = false, dragStartX, dragStartY;

canvas.addEventListener('mousedown', e => {
  drag = true; hasDragged = false;
  dragStartX = e.clientX - offsetX;
  dragStartY = e.clientY - offsetY;
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mouseup', e => {
  if (!hasDragged && drag) {
    const gx = Math.floor((e.clientX - offsetX) / taille);
    const gy = Math.floor((e.clientY - offsetY) / taille);
    if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
      ouvrirPopup(gx, gy, e.clientX, e.clientY);
    }
  }
  drag = false;
  canvas.style.cursor = 'crosshair';
});

window.addEventListener('mousemove', e => {
  if (drag) {
    const dx = Math.abs(e.clientX - (dragStartX + offsetX));
    const dy = Math.abs(e.clientY - (dragStartY + offsetY));
    if (dx > 4 || dy > 4) hasDragged = true;
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    dessiner();
  }
  const gx = Math.floor((e.clientX - offsetX) / taille);
  const gy = Math.floor((e.clientY - offsetY) / taille);
  if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H)
    document.getElementById('coords').textContent = `x: ${gx}  y: ${gy}`;
});

// Fermer popup si clic dehors
document.addEventListener('mousedown', e => {
  const popup = document.getElementById('popup');
  if (popup.classList.contains('open') && !popup.contains(e.target) && e.target !== canvas)
    fermerPopup();
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const ancien = taille;
  zoomIdx = Math.max(0, Math.min(ZOOMS.length-1, zoomIdx + (e.deltaY < 0 ? 1 : -1)));
  taille  = ZOOMS[zoomIdx];
  const cx = canvas.width/2, cy = canvas.height/2;
  offsetX = cx - (cx - offsetX) * (taille/ancien);
  offsetY = cy - (cy - offsetY) * (taille/ancien);
  document.getElementById('zoomLabel').textContent = taille + '×';
  dessiner();
}, { passive: false });

function changerZoom(dir) {
  const ancien = taille;
  zoomIdx = Math.max(0, Math.min(ZOOMS.length-1, zoomIdx+dir));
  taille  = ZOOMS[zoomIdx];
  const cx = canvas.width/2, cy = canvas.height/2;
  offsetX = cx - (cx-offsetX)*(taille/ancien);
  offsetY = cy - (cy-offsetY)*(taille/ancien);
  document.getElementById('zoomLabel').textContent = taille+'×';
  dessiner();
}

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  dessiner();
});

canvas.style.cursor = 'crosshair';
chargerPixels();
</script>
</body>
</html>
